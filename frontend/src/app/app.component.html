<div class="dashboard-container">
  <!-- Filtros -->
  <div class="filtros-container">
    <div class="filtro-group">
      <label for="pais">País:</label>
      <select id="pais" [(ngModel)]="paisSeleccionado" (change)="onPaisChange(paisSeleccionado)">
        <option *ngFor="let pais of paises" [value]="pais">{{ pais }}</option>
      </select>
    </div>

    <div class="filtro-group">
      <label>Sexo:</label>
      <div class="sexo-buttons">
        <button 
          [class.active]="sexoSeleccionado === 'mujeres'"
          (click)="onSexoChange('mujeres')">
          👩 Mujeres
        </button>
        <button 
          [class.active]="sexoSeleccionado === 'hombres'"
          (click)="onSexoChange('hombres')">
          👨 Hombres
        </button>
      </div>
    </div>
  </div>

  <!-- Mapa -->
  <div *ngIf="!cargando" class="mapa-container">
    <app-mapa 
      [pais]="paisSeleccionado"
      [sexo]="sexoSeleccionado"
      [datos]="datosUnidades">
    </app-mapa>
  </div>

  <!-- Leyenda actualizada -->

  <div class="leyenda">
    <span><strong>Horas semanales:</strong></span>
    <div class="leyenda-item">
      <div class="color-box" style="background-color: #FFF5F5;"></div>
      <span>Menos de 35 hrs</span>
    </div>
    <div class="leyenda-item">
      <div class="color-box" style="background-color: #FFD4D4;"></div>
      <span>35 - 40 hrs</span>
    </div>
    <div class="leyenda-item">
      <div class="color-box" style="background-color: #FFA8A8;"></div>
      <span>40 - 45 hrs</span>
    </div>
    <div class="leyenda-item">
      <div class="color-box" style="background-color: #FF8A8A;"></div>
      <span>45 - 50 hrs</span>
    </div>
    <div class="leyenda-item">
      <div class="color-box" style="background-color: #FF5252;"></div>
      <span>50 - 55 hrs</span>
    </div>
    <div class="leyenda-item">
      <div class="color-box" style="background-color: #FF0000;"></div>
      <span>55 - 60 hrs</span>
    </div>
    <div class="leyenda-item">
      <div class="color-box" style="background-color: #8B0000;"></div>
      <span>Más de 60 hrs</span>
    </div>
  </div>

  <!-- Resumen -->
  <div *ngIf="!cargando" class="stats-resumen">
    <div class="stat-card">
      <div class="stat-label">Promedio {{ paisSeleccionado }}</div>
      <div class="stat-value">{{ calcularPromedio() | number:'1.1-1' }} hrs/sem</div>
    </div>
  </div>
</div>
